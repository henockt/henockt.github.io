<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="title" content="heno Labs Interships">
        <meta name="description" content="Internship Programs at heno Labs Inc. Apply using henac before deadline.">
        <meta name="robots" content="noindex, nofollow">
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-eOJMYsd53ii+scO/bJGFsiCZc+5NDVN2yr8+0RDqr0Ql0h+rP48ckxlpbzKgwra6" crossorigin="anonymous">
        <title>Internship Program</title>
        <style type="text/css">
            @import url('https://fonts.googleapis.com/css?family=Poppins:200,300,400,500,600,700,800,900&display=swap');
            body {
                background-color: dimgrey;
                color: floralwhite;
                font-size: larger;
                font-family: "Poppins", sans-serif;
                text-align: center;
            }
            .start {
                font-size: large;
                padding: 0.75rem;
            }
            #ytplayer {
                display: none;
                text-align: center;
                pointer-events: none;
            }
            p {
                font-size: larger;
            }
            .content {
                margin-top: 5rem !important;
                margin-bottom: 1.5rem !important;
                max-width: 75%;
            }
            .list-group {
                font-size: medium;
                margin-bottom: 1.5rem;
            }
        </style>
    </head>
    <body>
        <div class="content container">
            <h2>Internship Programs at heno Labs Inc.</h2>
            <p>Applying using henac will allow you to:</p>
            <ul class="list-group">
                <li class="list-group-item">Create your own personal account for future visits.</li>
                <li class="list-group-item">Return to view and update your personal history form at any time.</li>
                <li class="list-group-item">Apply for Internship.</li>
              </ul>
            <button type="button" class="btn btn-primary start" onclick="start();">Click here for the application system</button>
        </div>
        <div id="ytplayer" class="container text-center"></div>
        <script>
            var tag = document.createElement('script');
            tag.src = "https://www.youtube.com/player_api";
            var firstScriptTag = document.getElementsByTagName('script')[0];
            firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
            var player;
            function onYouTubePlayerAPIReady() {
                player = new YT.Player('ytplayer', {
                height: '360',
                width: '640',
                videoId: 'dQw4w9WgXcQ',
                playerVars: {
                    'showinfo': 0,
                    'controls': 0,
                }
                });
            }
            function start() {
                player.setVolume(100);
                player.playVideo();
                document.getElementById("ytplayer").style.display = "block";
            }
        </script>
    </body>
</html>
